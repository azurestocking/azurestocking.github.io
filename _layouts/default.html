<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMMA LI</title>
    <meta name="description">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪩</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/helvetica-neue-lt-pro-55" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body data-page-color="{{ page.color | default: '#ffffff' }}">
    <header class="grid" style="align-items: center;">
        <aside class="side-container" aria-hidden="true">
            <div class="logo">
                <a href="{{ '/' | relative_url }}">GEMMA</a>
            </div>
        </aside>
        <div class="main-container" style="margin-bottom: 0;">
            <div class="grid-4-1" style="align-items: center;">
                <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                    <div class="button-group">
                        <a class="button ghost navlink" href="{{ '/#about' | relative_url }}">About<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                        <a class="button ghost navlink" href="{{ '/#featured' | relative_url }}">Work<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                        <a class="button ghost navlink" href="https://www.linkedin.com/in/li-jm/">LinkedIn<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                        <a class="button ghost navlink" href="https://github.com/azurestocking">GitHub<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end;">
                    <a class="button navlink" href="#footer">Contact<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                </div>
            </div>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="grid">
        <aside class="side-container" aria-hidden="true"></aside>
        <div class="main-container">
            <div class="grid-4-1">
                <p style="font-family: var(--font-mono); text-transform: uppercase;">
                    Coded from scratch with 🤖 Jekyll framework and 🍵 Lapsang Souchong
                </p>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            var header = document.querySelector('header');
            var overview = document.getElementById('overview');
            function getPageColor() { return (document.body.getAttribute('data-page-color') || '#ffffff').trim(); }
            function setNavbarBg(color) {
                if (header) header.style.backgroundColor = color;
            }
            function updateHeader() {
                if (!header) return;
                if (!overview) {
                    header.classList.add('header-solid');
                    setNavbarBg('#ffffff');
                    return;
                }
                var rect = overview.getBoundingClientRect();
                if (rect.bottom <= 0) {
                    header.classList.add('header-solid');
                    setNavbarBg('#ffffff');
                } else {
                    header.classList.remove('header-solid');
                    setNavbarBg(getPageColor());
                }
            }
            window.addEventListener('scroll', updateHeader);
            window.addEventListener('resize', updateHeader);
            updateHeader();
        })();
    </script>
</body>
</html>
