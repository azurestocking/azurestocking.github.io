<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMMA LI</title>
    <meta name="description">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪩</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>
    <header class="grid" style="background-color: var(--bg);">
        <aside class="side-container" aria-hidden="true">
            <div class="logo">
                <a href="{{ '/' | relative_url }}">GEMMA LI</a>
            </div>
        </aside>
        <div class="main-container">
            <div class="grid-1-1-1">
                <div></div>
                <div></div>
                <div style="display: flex; justify-content: flex-end; gap: var(--space-grid);">
                    <a class="button ghost" href="https://www.linkedin.com/in/li-jm/">LinkedIn<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                    <a class="button ghost" href="https://github.com/azurestocking">GitHub<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                    <a class="button" href="#about">About<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                </div>
            </div>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="grid">
        <div class="hero" style="padding-top: 0; margin-bottom: 0;">
            <hr>
            <div style="font-family: var(--font-mono); text-transform: uppercase;">
                Coded from scratch with 🤖 Jekyll and 🍵 Lapsang Souchong
            </div>
        </div> 
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('contextmenu', function(e) {
                if (e.target.matches('img, video')) e.preventDefault();
            });
        });
    </script>
</body>
</html>
