<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMMA LI</title>
    <meta name="description">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪩</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/helvetica-neue-lt-pro-55" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body>
    <header class="grid" style="align-items: center;">
        <aside class="side-container" aria-hidden="true">
            <div class="logo">
                <a href="{{ '/' | relative_url }}">GEMMA LI</a>
            </div>
        </aside>
        <div class="main-container">
            <div class="grid-1-1-1" style="align-items: center;">
                <div></div>
                <div></div>
                <div style="display: flex; justify-content: flex-end;">
                    <a class="button navlink" href="#footer">Contact<i class="fa-solid fa-arrow-right rotate-45"></i></a>
                </div>
            </div>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="grid">
        <aside class="side-container" aria-hidden="true"></aside>
        <div class="main-container">
            <div class="grid-3">
                <hr>
                <div style="font-family: var(--font-mono); text-transform: uppercase;">
                    Coded from scratch with 🤖 Jekyll and 🍵 Lapsang Souchong
                </div>
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('contextmenu', function(e) {
                if (e.target.matches('img, video')) e.preventDefault();
            });
        });
    </script>
    {% include bg-switcher.html %}
</body>
</html>
