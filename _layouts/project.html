---
layout: default
---

<div class="grid">
    <aside class="side-container" aria-hidden="true" style="margin-top: 25vh; border-top: var(--tertiary-focus) 1px solid;">
        <section>
            <div>{{ page.desc }}</div>
        </section>
        <section id="scrollspy" class="scrollspy-hidden">
            <div class="scrollspy">
                <div class="scrollspy-content">
                    <div class="scrollspy-links" id="scrollspy-links">
                    </div>
                </div>
            </div>
        </section>
    </aside>
    <div class="main-container" style="margin-top: 25vh; border-top: var(--tertiary-focus) 1px solid;">
        <section style="margin-top: 0;">
            <h4>{{ page.client }}</h4>
            <div class="grid-3">
                <div>
                    <img src="{{ page.image | relative_url }}" alt="" loading="lazy">
                </div>
            </div>
        </section>
        
        {{ content }}
    </div>
</div>

<script src="{{ '/js/scrollspy.js' | relative_url }}"></script>
