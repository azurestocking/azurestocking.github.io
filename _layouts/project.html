---
layout: default
---

<div class="grid" data-project-color="{{ page.color }}">
    <aside class="side-container" aria-hidden="true" style="margin-top: 25vh;">
        <section>
            <div>{{ page.desc }}</div>
        </section>
        <section id="scrollspy" class="scrollspy-hidden">
            <div class="scrollspy">
                <div class="scrollspy-content">
                    <div class="scrollspy-links" id="scrollspy-links">
                    </div>
                </div>
            </div>
        </section>
    </aside>
    <div class="main-container" style="margin-top: 25vh;">
        <section class="hero">
            <div class="grid-2-1">
                <h1>{{ page.client }}</h1>
            </div>
            <div class="grid-2-1">
                <p>{{ page.desc }}</p>
            </div>
            <div class="grid-2-1">
                <div class="hero-meta">
                    <div class="hero-meta-item">
                        <span class="label">module</span>
                        <span class="value">10</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="label">module</span>
                        <span class="value">10</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="label">module</span>
                        <span class="value">10</span>
                    </div>
                </div>
            </div>
            <div class="grid-3">
                <img src="{{ page.image | relative_url }}" alt="" loading="lazy">
            </div>
        </section>
        
        {{ content }}
    </div>
</div>

<script src="{{ '/js/scrollspy.js' | relative_url }}"></script>
{% comment %}{% include bg-switcher.html %}{% endcomment %}
