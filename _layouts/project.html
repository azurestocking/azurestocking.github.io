---
layout: default
---

<div class="grid" data-project-color="{{ page.color }}">
    <aside class="side-container" aria-hidden="true" style="margin-top: 25vh; border-top: var(--tertiary) 1px solid;">
        <section>
            <div>{{ page.desc }}</div>
        </section>
        <section id="scrollspy" class="scrollspy-hidden">
            <div class="scrollspy">
                <div class="scrollspy-content">
                    <div class="scrollspy-links" id="scrollspy-links">
                    </div>
                </div>
            </div>
        </section>
    </aside>
    <div class="main-container" style="margin-top: 25vh;">
        <section class="subtitle">
            <h3 class="hide">
                <a href="{{ '/' | relative_url }}" style="text-decoration: none; color: inherit; font-weight: inherit;">
                    <i class="fa-solid fa-arrow-left" style="margin-bottom: 0.25em;"></i> INDEX
                </a>
            </h3>
        </section>
        <section style="border-top: var(--tertiary) 1px solid;">
            <div class="grid-3">
                <div class="p-l">{{ page.desc }}</div>
            </div>
        </section>
        <section class="full-bg">
            <div class="grid-3">
                <div>
                    <img src="{{ page.image | relative_url }}" alt="" loading="lazy">
                </div>
            </div>
        </section>
        
        {{ content }}
    </div>
</div>

<script src="{{ '/js/scrollspy.js' | relative_url }}"></script>
{% include bg-switcher.html %}
