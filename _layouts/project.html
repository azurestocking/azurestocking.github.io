---
layout: default
---

<div class="grid" data-project-color="{{ page.color }}">
    <section class="hero" style="background-color: var(--surface); box-shadow: 0 0 0 100vmax var(--surface); clip-path: inset(0 -100vmax);">
        <div>
            <div class="grid-2-2">
                <h1>{{ page.client }}</h1>
            </div>
            <div class="grid-2-2">
                <p style="color: var(--text);">{{ page.desc }}</p>
            </div>
            <div class="grid-2-2">
                <div class="hero-meta">
                    <div class="hero-meta-item">
                        <span class="label">Timeline</span>
                        <span class="value">{{ page.timeline }}</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="label">Category</span>
                        <span class="value">{{ page.category }}</span>
                    </div>
                    <div class="hero-meta-item">
                        <span class="label">Role</span>
                        <span class="value">{{ page.role }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <div class="grid-4">
                <img src="{{ page.image | relative_url }}" alt="" loading="lazy">
            </div>
        </div>
    </section>

    <aside class="side-container" aria-hidden="true">
        <section id="scrollspy" class="scrollspy-hidden">
            <div class="scrollspy">
                <div class="scrollspy-content">
                    <div class="scrollspy-links" id="scrollspy-links">
                    </div>
                </div>
            </div>
        </section>
    </aside>
    
    <div class="main-container">
        {{ content }}
    </div>
</div>

<script src="{{ '/js/scrollspy.js' | relative_url }}"></script>
{% comment %}{% include bg-switcher.html %}{% endcomment %}
